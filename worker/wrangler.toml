name = "aftersold-mailer"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Daily at 14:00 UTC (~morning in the US). The cron scans the list and mails
# any card whose occasion (birthday / anniversary / holiday) lands today.
[triggers]
crons = ["0 14 * * *"]

# D1 database that stores orders, recipients, and a send-log (dedupe).
# Create it once with:  wrangler d1 create aftersold
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "aftersold"
database_id = "2f1b7300-daed-4ba1-9c9f-e01a0cbd27ab"

[vars]
# Origins allowed to POST — comma-separated, worker parses the list.
ALLOWED_ORIGIN = "https://getaftersold.com,https://600589mbm-beep.github.io,https://www.getaftersold.com"
# Secrets (set via `wrangler secret put NAME` or the Cloudflare dashboard):
#   DOCUPOST_API_KEY   — DocuPost API token
#   ADMIN_TOKEN        — token required to view /admin
